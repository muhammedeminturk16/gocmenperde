<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş & Kayıt - Göçmen Perde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { background: white; width: 90%; max-width: 400px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .tabs { display: flex; background: #eee; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; color: #666; }
        .tab.active { background: white; color: #b08d57; border-bottom: 3px solid #b08d57; }
        .form-area { padding: 30px; }
        .form-group { display: none; }
        .form-group.active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #b08d57; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        .logo-area { text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        .logo-area { text-align: center; padding: 20px; background: #fff; color: #1a1a1a; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <h2 style="margin:0; letter-spacing: 2px;">GÖÇMEN PERDE</h2>
    </div>
    <div class="tabs">
        <div id="loginTab" class="tab active" onclick="showForm('login')">GİRİŞ YAP</div>
        <div id="registerTab" class="tab" onclick="showForm('register')">KAYIT OL</div>
    </div>

    <div class="form-area">
        <div id="loginForm" class="form-group active">
            <input type="email" id="lEmail" placeholder="E-posta Adresi">
            <input type="password" id="lPass" placeholder="Şifre">
            <button class="btn" onclick="submitForm('login')" id="lBtn">GİRİŞ YAP</button>
        </div>

        <div id="registerForm" class="form-group">
            <input type="text" id="rName" placeholder="Ad Soyad">
            <input type="email" id="rEmail" placeholder="E-posta (@gmail.com / @hotmail.com)">
            <input type="text" id="rPhone" placeholder="Telefon (05xx...)">
            <input type="password" id="rPass" placeholder="Şifre (en az 6 karakter, harf + sayı)">
            <button class="btn" onclick="submitForm('register')" id="rBtn">HESAP OLUŞTUR</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('mod') === 'register') showForm('register');

    function showForm(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Tab').classList.add('active');
        document.getElementById(type + 'Form').classList.add('active');
    }

    async function submitForm(type) {
        const btn = document.getElementById(type === 'login' ? 'lBtn' : 'rBtn');
        const data = type === 'login' 
            ? { email: document.getElementById('lEmail').value, sifre: document.getElementById('lPass').value }
            : { ad_soyad: document.getElementById('rName').value, email: document.getElementById('rEmail').value, telefon: document.getElementById('rPhone').value, sifre: document.getElementById('rPass').value };

        if (type === 'register') {
            const email = (data.email || '').trim().toLowerCase();
            const sifre = data.sifre || '';
            const allowedEmail = /@(gmail\.com|hotmail\.com)$/i.test(email);
            const validPassword = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/.test(sifre);

            if (!allowedEmail) {
                alert('Kayıt için e-posta adresiniz @gmail.com veya @hotmail.com ile bitmelidir.');
                return;
            }

            if (!validPassword) {
                alert('Şifre en az 6 karakter olmalı ve en az 1 harf ile 1 sayı içermelidir.');
                return;
            }
        }

        btn.disabled = true;
        btn.innerText = 'Bekleyiniz...';

        try {
            const response = await fetch('/api/auth?action=' + type, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const res = await response.json();

            if(res.success) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('gp_token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                alert(type === 'login' ? 'Hoş geldiniz!' : 'Kaydınız başarıyla oluşturuldu!');
                window.location.href = '/';
            } else {
                alert('Hata: ' + (res.error || 'Bilgiler yanlış.'));
            }
        } catch (err) {
            alert('Bağlantı Hatası! Vercel Logs kısmını kontrol edin.');
        } finally {
            btn.disabled = false;
            btn.innerText = type === 'login' ? 'GİRİŞ YAP' : 'HESAP OLUŞTUR';
        }
    }
</script>
</body>
</html>
