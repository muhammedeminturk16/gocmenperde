<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Göçmen Perde | Bursa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--dark:#121212;
--light:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:var(--light);}

/* NAVBAR */
header{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
z-index:1000;
}

.nav{
display:flex;
justify-content:space-between;
padding:15px 5%;
color:white;
}

.logo{
font-family:Playfair Display;
font-size:22px;
}
.logo span{color:var(--gold);}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
font-size:14px;
}

nav a:hover{color:var(--gold);}

/* HERO */
.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6');
background-size:cover;
}

.hero h1{
font-size:60px;
color:var(--gold);
font-family:Playfair Display;
}

.hero button{
margin-top:20px;
padding:12px 30px;
border:none;
background:var(--gold);
cursor:pointer;
}

/* SECTION */
.section{padding:80px 5%;}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{transform:translateY(-8px);}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{padding:10px;}

.price{
color:var(--gold);
font-weight:bold;
padding-left:10px;
}

.btn{
margin:10px;
padding:10px;
background:black;
color:white;
border:none;
width:calc(100% - 20px);
}

/* CART */
#cart{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px;
border-radius:10px;
}

/* MODAL */
#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
}

.modal-content{
background:white;
max-width:800px;
margin:50px auto;
padding:20px;
}

</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">GÖÇMEN <span>PERDE</span></div>
<nav>
<a onclick="go('urunler')">Ürünler</a>
<a onclick="go('iletisim')">İletişim</a>
</nav>
</div>
</header>

<div class="hero">
<div>
<h1>Göçmen Perde</h1>
<button onclick="go('urunler')">Ürünleri Gör</button>
</div>
</div>

<div class="section" id="urunler">

<h2>Tül Perdeler</h2>
<div class="grid">

<div class="card">
<img src="resimler/dikili_perde.jpeg" onclick="detay('Saray Tül',200)">
<h3>Saray Tül</h3>
<div class="price">200 TL</div>
<button class="btn" onclick="ekle('Saray Tül',200)">Sepete Ekle</button>
</div>

</div>

<h2>Fon Perdeler</h2>
<div class="grid">

<div class="card">
<img src="resimler/kumas_fon_renkli.jpeg" onclick="detay('Ekonomik Fon',2500)">
<h3>Ekonomik Fon</h3>
<div class="price">2500 TL</div>
<button class="btn" onclick="ekle('Ekonomik Fon',2500)">Sepete Ekle</button>
</div>

<div class="card">
<img src="resimler/brillant_fon.jpeg" onclick="detay('VIP Fon',4500)">
<h3>VIP Fon</h3>
<div class="price">4500 TL</div>
<button class="btn" onclick="ekle('VIP Fon',4500)">Sepete Ekle</button>
</div>

</div>

<h2>Koltuk Örtüleri</h2>
<div class="grid">

<div class="card">
<img src="resimler/koltuk_ortusu.jpeg" onclick="detay('Set 3311',1500)">
<h3>3+3+1+1</h3>
<div class="price">1500 TL</div>
<button class="btn" onclick="ekle('Set 3311',1500)">Sepete Ekle</button>
</div>

<div class="card">
<img src="resimler/koltuk_ortusu.jpeg" onclick="detay('Set 33',1200)">
<h3>3+3</h3>
<div class="price">1200 TL</div>
<button class="btn" onclick="ekle('Set 33',1200)">Sepete Ekle</button>
</div>

</div>

</div>

<div class="section" id="iletisim">
<h2>İletişim</h2>
<p>Bursa / Osmangazi</p>
<p>0501 211 0958</p>
</div>

<div id="cart">
Sepet: <span id="count">0</span>
</div>

<script>
let basket=[];

function ekle(n,p){
basket.push({n,p});
document.getElementById("count").innerText=basket.length;
}

function detay(n,p){
alert(n+" - "+p+" TL");
}

function go(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
