<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesabım - Göçmen Perde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        header { background: #1a1a1a; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        header a { color: white; text-decoration: none; font-size: 20px; }
        header h1 { font-size: 18px; letter-spacing: 2px; flex: 1; text-align: center; }
        .user-bar { background: #b08d57; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-bar span { font-weight: bold; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .tabs { display: flex; background: white; border-bottom: 2px solid #eee; overflow-x: auto; }
        .tab { padding: 14px 20px; cursor: pointer; font-weight: bold; color: #666; white-space: nowrap; border-bottom: 3px solid transparent; transition: 0.2s; font-size: 13px; }
        .tab.active { color: #b08d57; border-bottom-color: #b08d57; }
        .content { padding: 20px; max-width: 700px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card h3 { color: #1a1a1a; margin-bottom: 10px; font-size: 15px; }
        .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status.beklemede { background: #fff3cd; color: #856404; }
        .status.hazirlaniyor { background: #cff4fc; color: #055160; }
        .status.kargoda { background: #d1ecf1; color: #0c5460; }
        .status.teslim { background: #d4edda; color: #155724; }
        .status.iptal { background: #f8d7da; color: #721c24; }
        .order-items { margin-top: 10px; font-size: 13px; color: #555; }
        .order-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .order-total { font-weight: bold; color: #b08d57; font-size: 16px; }
        .order-date { font-size: 12px; color: #999; }
        .address-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: flex-start; }
        .address-info h4 { font-size: 14px; color: #1a1a1a; margin-bottom: 5px; }
        .address-info p { font-size: 13px; color: #666; }
        .delete-btn { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 16px; padding: 5px; }
        .add-form { background: white; border-radius: 10px; padding: 20px; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .add-form h3 { margin-bottom: 15px; color: #1a1a1a; font-size: 15px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 14px; font-family: inherit; }
        .btn { padding: 10px 20px; background: #b08d57; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-outline { background: white; color: #b08d57; border: 2px solid #b08d57; }
        .fav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .fav-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .fav-card img { width: 100%; height: 130px; object-fit: cover; }
        .fav-card-body { padding: 10px; }
        .fav-card-body h4 { font-size: 13px; color: #1a1a1a; margin-bottom: 5px; }
        .fav-card-body p { font-size: 13px; color: #b08d57; font-weight: bold; }
        .fav-card-footer { padding: 8px 10px; display: flex; gap: 8px; }
        .fav-card-footer button { flex: 1; padding: 7px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-remove { background: #f8d7da; color: #721c24; }
        .btn-view { background: #b08d57; color: white; }
        .profile-form label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; margin-top: 10px; }
        .empty { text-align: center; padding: 40px 20px; color: #999; }
        .empty i { font-size: 40px; margin-bottom: 10px; display: block; }
        .loading { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>

<header>
    <a href="/"><i class="fas fa-arrow-left"></i></a>
    <h1>HESABIM</h1>
</header>

<div class="user-bar">
    <span id="userName">Yükleniyor...</span>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Çıkış</button>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('orders')"><i class="fas fa-box"></i> Siparişlerim</div>
    <div class="tab" onclick="showTab('addresses')"><i class="fas fa-map-marker-alt"></i> Adreslerim</div>
    <div class="tab" onclick="showTab('favorites')"><i class="fas fa-heart"></i> Favorilerim</div>
    <div class="tab" onclick="showTab('profile')"><i class="fas fa-user"></i> Profilim</div>
</div>

<div class="content">

    <!-- SİPARİŞLERİM -->
    <div id="orders" class="section active">
        <div id="ordersList" class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>
    </div>

    <!-- ADRESLERİM -->
    <div id="addresses" class="section">
        <div id="addressList" class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>
        <div class="add-form">
            <h3><i class="fas fa-plus"></i> Yeni Adres Ekle</h3>
            <input type="text" id="aBaslik" placeholder="Adres Başlığı (Ev, İş...)">
            <input type="text" id="aMahalle" placeholder="Mahalle">
            <input type="text" id="aSokak" placeholder="Sokak / Cadde">
            <input type="text" id="aKapiNo" placeholder="Kapı Numarası (Daire vb.)">
            <input type="text" id="aIlce" placeholder="İlçe">
            <input type="text" id="aIl" placeholder="İl">
            <button class="btn" onclick="addAddress()">Adresi Kaydet</button>
        </div>
    </div>

    <!-- FAVORİLERİM -->
    <div id="favorites" class="section">
        <div id="favList" class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>
    </div>

    <!-- PROFİLİM -->
    <div id="profile" class="section">
        <div class="card">
            <h3>Bilgilerimi Güncelle</h3>
            <div class="profile-form">
                <label>Ad Soyad</label>
                <input type="text" id="pName" placeholder="Ad Soyad">
                <label>E-posta</label>
                <input type="email" id="pEmail" disabled style="background:#f5f5f5;">
                <label>Telefon</label>
                <input type="text" id="pPhone" placeholder="Telefon">
                <button class="btn" onclick="updateProfile()" style="margin-top:10px; width:100%;">Güncelle</button>
            </div>
        </div>
        <div class="card">
            <h3>Şifre Değiştir</h3>
            <div class="profile-form">
                <label>Mevcut Şifre</label>
                <input type="password" id="eskiSifre" placeholder="Mevcut şifre">
                <label>Yeni Şifre</label>
                <input type="password" id="yeniSifre" placeholder="Yeni şifre (en az 6 karakter, harf + sayı)">
                <button class="btn" onclick="changePassword()" style="margin-top:10px; width:100%;">Şifreyi Değiştir</button>
            </div>
        </div>
    </div>

</div>

<script>
const token = localStorage.getItem('token') || localStorage.getItem('gp_token');
const user = JSON.parse(localStorage.getItem('user') || 'null');

if (!token || !user) {
    window.location.href = '/hesap.html';
}

document.getElementById('userName').textContent = user?.ad_soyad || user?.email || '';

function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    event.target.closest('.tab').classList.add('active');
    document.getElementById(tab).classList.add('active');
    if (tab === 'orders') loadOrders();
    if (tab === 'addresses') loadAddresses();
    if (tab === 'favorites') loadFavorites();
    if (tab === 'profile') loadProfile();
}

function activateTabFromQuery() {
    const tab = new URLSearchParams(window.location.search).get('tab');
    if (!tab) return;
    const tabBtn = document.querySelector(`.tab[onclick*="${tab}"]`);
    if (tabBtn) tabBtn.click();
}

// SİPARİŞLER
async function loadOrders() {
    const el = document.getElementById('ordersList');
    el.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';
    try {
        const r = await fetch('/api/orders?action=my-orders', { headers: authHeaders() });
        const data = await r.json();
        if (!data.orders?.length) {
            el.innerHTML = '<div class="empty"><i class="fas fa-box-open"></i>Henüz siparişiniz yok.</div>';
            return;
        }
        el.innerHTML = data.orders.map(o => {
            const items = typeof o.urunler === 'string' ? JSON.parse(o.urunler) : o.urunler;
            const statusClass = o.durum?.toLowerCase().replace(' ', '') || 'beklemede';
            const date = new Date(o.created_at).toLocaleDateString('tr-TR');
            return `<div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <h3>Sipariş #${o.id}</h3>
                    <span class="status ${statusClass}">${o.durum || 'Beklemede'}</span>
                </div>
                <div class="order-items">${items?.map(i => `${i.name || i.ad} × ${i.quantity || i.adet}`).join(', ') || ''}</div>
                <div class="order-meta">
                    <span class="order-date">${date}</span>
                    <span class="order-total">${Number(o.toplam).toLocaleString('tr-TR')} ₺</span>
                </div>
            </div>`;
        }).join('');
    } catch(e) {
        el.innerHTML = '<div class="empty"><i class="fas fa-exclamation-circle"></i>Yüklenemedi.</div>';
    }
}

// ADRESLER
async function loadAddresses() {
    const el = document.getElementById('addressList');
    el.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';
    try {
        const r = await fetch('/api/auth?action=addresses', { headers: authHeaders() });
        const data = await r.json();
        if (!data.addresses?.length) {
            el.innerHTML = '<div class="empty"><i class="fas fa-map-marker-alt"></i>Kayıtlı adres yok.</div>';
            return;
        }
        el.innerHTML = data.addresses.map(a => `
            <div class="address-card">
                <div class="address-info">
                    <h4><i class="fas fa-map-marker-alt" style="color:#b08d57"></i> ${a.baslik}</h4>
                    <p>${a.adres}</p>
                </div>
                <button class="delete-btn" onclick="deleteAddress(${a.id})"><i class="fas fa-trash"></i></button>
            </div>
        `).join('');
    } catch(e) {
        el.innerHTML = '<div class="empty">Yüklenemedi.</div>';
    }
}

async function addAddress() {
    const baslik = document.getElementById('aBaslik').value.trim();
    const mahalle = document.getElementById('aMahalle').value.trim();
    const sokak = document.getElementById('aSokak').value.trim();
    const kapiNo = document.getElementById('aKapiNo').value.trim();
    const ilce = document.getElementById('aIlce').value.trim();
    const il = document.getElementById('aIl').value.trim();

    if (!baslik || !mahalle || !sokak || !kapiNo || !ilce || !il) {
        return alert('Lütfen adresi mahalle, sokak/cadde, kapı no, ilçe ve il şeklinde eksiksiz doldurun.');
    }

    const adres = [
        `Mahalle: ${mahalle}`,
        `Sokak/Cadde: ${sokak}`,
        `Kapı No: ${kapiNo}`,
        `İlçe: ${ilce}`,
        `İl: ${il}`
    ].join('\n');

    const r = await fetch('/api/auth?action=add-address', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ baslik, adres })
    });
    const data = await r.json();
    if (data.success) {
        document.getElementById('aBaslik').value = '';
        document.getElementById('aMahalle').value = '';
        document.getElementById('aSokak').value = '';
        document.getElementById('aKapiNo').value = '';
        document.getElementById('aIlce').value = '';
        document.getElementById('aIl').value = '';
        loadAddresses();
    } else alert('Hata: ' + data.error);
}

async function deleteAddress(id) {
    if (!confirm('Bu adresi silmek istediğinize emin misiniz?')) return;
    const r = await fetch('/api/auth?action=delete-address', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ id })
    });
    const data = await r.json();
    if (data.success) loadAddresses();
}

// FAVORİLER
async function loadFavorites() {
    const el = document.getElementById('favList');
    el.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Yükleniyor...</div>';
    try {
        const r = await fetch('/api/favorites?action=list', { headers: authHeaders() });
        const data = await r.json();
        if (!data.favorites?.length) {
            el.innerHTML = '<div class="empty"><i class="fas fa-heart"></i>Henüz favori ürün yok.</div>';
            return;
        }
        el.innerHTML = '<div class="fav-grid">' + data.favorites.map(f => `
            <div class="fav-card">
                <img src="${f.urun_resim || '/placeholder.jpg'}" alt="${f.urun_adi}" onerror="this.src='/placeholder.jpg'">
                <div class="fav-card-body">
                    <h4>${f.urun_adi}</h4>
                    <p>${f.urun_fiyat}</p>
                </div>
                <div class="fav-card-footer">
                    <button class="btn-remove" onclick="removeFav('${f.urun_id}')"><i class="fas fa-trash"></i> Sil</button>
                    <button class="btn-view" onclick="window.location.href='/urun.html?id=${f.urun_id}'"><i class="fas fa-eye"></i> Gör</button>
                </div>
            </div>
        `).join('') + '</div>';
    } catch(e) {
        el.innerHTML = '<div class="empty">Yüklenemedi.</div>';
    }
}

async function removeFav(urun_id) {
    const r = await fetch('/api/favorites?action=remove', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ urun_id })
    });
    const data = await r.json();
    if (data.success) {
        try {
            const current = JSON.parse(localStorage.getItem('gpFav') || '[]');
            const next = current.filter(f => String(f.id) !== String(urun_id));
            localStorage.setItem('gpFav', JSON.stringify(next));
            localStorage.setItem('gp_user_favorites', JSON.stringify(next));
        } catch(e) {}
        loadFavorites();
    }
}

// PROFİL
async function loadProfile() {
    const r = await fetch('/api/auth?action=profile', { headers: authHeaders() });
    const data = await r.json();
    if (data.user) {
        document.getElementById('pName').value = data.user.ad_soyad || '';
        document.getElementById('pEmail').value = data.user.email || '';
        document.getElementById('pPhone').value = data.user.telefon || '';
    }
}

async function updateProfile() {
    const ad_soyad = document.getElementById('pName').value;
    const telefon = document.getElementById('pPhone').value;
    const r = await fetch('/api/auth?action=update', {
        method: 'PUT', headers: authHeaders(),
        body: JSON.stringify({ ad_soyad, telefon })
    });
    const data = await r.json();
    if (data.success) {
        const u = JSON.parse(localStorage.getItem('user'));
        u.ad_soyad = ad_soyad;
        localStorage.setItem('user', JSON.stringify(u));
        document.getElementById('userName').textContent = ad_soyad;
        alert('Bilgiler güncellendi.');
    } else alert('Hata: ' + data.error);
}

async function changePassword() {
    const eski_sifre = document.getElementById('eskiSifre').value;
    const yeni_sifre = document.getElementById('yeniSifre').value;
    const validPassword = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/.test(yeni_sifre || '');
    if (!validPassword) {
        alert('Yeni şifre en az 6 karakter olmalı ve en az 1 harf ile 1 sayı içermelidir.');
        return;
    }
    const r = await fetch('/api/auth?action=change-password', {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ eski_sifre, yeni_sifre })
    });
    const data = await r.json();
    if (data.success) {
        alert('Şifre değiştirildi.');
        document.getElementById('eskiSifre').value = '';
        document.getElementById('yeniSifre').value = '';
    } else alert('Hata: ' + data.error);
}

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('gp_token');
    localStorage.removeItem('user');
    window.location.href = '/';
}

// Sayfa açılınca siparişleri yükle
loadOrders();
loadProfile();
activateTabFromQuery();
</script>
</body>
</html>
