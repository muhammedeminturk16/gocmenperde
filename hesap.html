<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş & Kayıt - Göçmen Perde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background:
                radial-gradient(circle at 14% 18%, rgba(114,188,221,0.30), transparent 38%),
                radial-gradient(circle at 84% 82%, rgba(236,178,159,0.32), transparent 42%),
                linear-gradient(135deg, #eef4ff 0%, #f8fbff 48%, #fff7f2 100%);
            padding: 22px;
        }
        .auth-card {
            background: rgba(255,255,255,0.86);
            width: 100%;
            max-width: 430px;
            border-radius: 18px;
            box-shadow: 0 24px 48px rgba(53,82,116,0.18);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .tabs { display: flex; background: rgba(239,244,252,0.85); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; color: #667085; }
        .tab.active { background: rgba(255,255,255,0.94); color: #3d6699; border-bottom: 3px solid #6f9bd1; }
        .form-area { padding: 30px; }
        .form-group { display: none; }
        .form-group.active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #d9e4f2; border-radius: 10px; box-sizing: border-box; background: rgba(255,255,255,0.92); }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #7ea8dd 0%, #5b87c2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(91,135,194,0.28);
        }
        .btn:disabled { background: #ccc; }
        .logo-area {
            text-align: center;
            padding: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.90) 0%, rgba(234,243,255,0.92) 100%);
            color: #2d3f57;
            border-bottom: 1px solid #e4edf7;
            letter-spacing: 1px;
        }
        .global-trust-strip{
            margin-top:22px;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:14px;
            max-width:1280px;
            width:100%;
        }
        .payment-logo-box{
            height:76px;
            min-width:170px;
            padding:0 22px;
            border:3px solid #d7d8db;
            border-radius:18px;
            background:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            box-sizing:border-box;
        }
        .payment-logo-box.compact{min-width:140px}
        .payment-logo-box.wide{min-width:260px}
        .payment-logo-img{
            height:42px;
            width:auto;
            max-width:100%;
            display:block;
        }
        @media (max-width:768px){
            .global-trust-strip{gap:10px}
            .payment-logo-box{
                min-width:145px;
                height:66px;
                border-width:2px;
                border-radius:14px;
                padding:0 14px;
            }
            .payment-logo-box.compact{min-width:122px}
            .payment-logo-box.wide{min-width:200px}
            .payment-logo-img{height:34px}
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <h2 style="margin:0; letter-spacing: 2px;">GÖÇMEN PERDE</h2>
    </div>
    <div class="tabs">
        <div id="loginTab" class="tab active" onclick="showForm('login')">GİRİŞ YAP</div>
        <div id="registerTab" class="tab" onclick="showForm('register')">KAYIT OL</div>
    </div>

    <div class="form-area">
        <div id="loginForm" class="form-group active">
            <input type="email" id="lEmail" placeholder="E-posta Adresi">
            <input type="password" id="lPass" placeholder="Şifre">
            <button class="btn" onclick="submitForm('login')" id="lBtn">GİRİŞ YAP</button>
        </div>

        <div id="registerForm" class="form-group">
            <input type="text" id="rName" placeholder="Ad Soyad">
            <input type="email" id="rEmail" placeholder="E-posta (@gmail.com / @hotmail.com)">
            <input type="text" id="rPhone" placeholder="Telefon (05xx...)">
            <input type="password" id="rPass" placeholder="Şifre (en az 6 karakter, harf + sayı)">
            <button class="btn" onclick="submitForm('register')" id="rBtn">HESAP OLUŞTUR</button>
        </div>
    </div>
</div>

<div class="global-trust-strip" aria-label="Güvenli ödeme logoları">
    <div class="payment-logo-box compact"><img class="payment-logo-img" src="/resimler/payment-logos/troy.svg" alt="Troy" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box"><img class="payment-logo-img" src="/resimler/payment-logos/amex.svg" alt="American Express" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box compact"><img class="payment-logo-img" src="/resimler/payment-logos/visa.svg" alt="Visa" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box compact"><img class="payment-logo-img" src="/resimler/payment-logos/mastercard.svg" alt="Mastercard" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box compact"><img class="payment-logo-img" src="/resimler/payment-logos/unionpay.svg" alt="UnionPay" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box compact"><img class="payment-logo-img" src="/resimler/payment-logos/3d-secure.svg" alt="3D Secure" loading="lazy" decoding="async"></div>
    <div class="payment-logo-box wide"><img class="payment-logo-img" src="/resimler/payment-logos/guvenli-ode.svg" alt="Güvenli Öde" loading="lazy" decoding="async"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('mod') === 'register') showForm('register');

    function showForm(type) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-group').forEach(f => f.classList.remove('active'));
        document.getElementById(type + 'Tab').classList.add('active');
        document.getElementById(type + 'Form').classList.add('active');
    }

    async function submitForm(type) {
        const btn = document.getElementById(type === 'login' ? 'lBtn' : 'rBtn');
        const data = type === 'login' 
            ? { email: document.getElementById('lEmail').value, sifre: document.getElementById('lPass').value }
            : { ad_soyad: document.getElementById('rName').value, email: document.getElementById('rEmail').value, telefon: document.getElementById('rPhone').value, sifre: document.getElementById('rPass').value };

        if (type === 'register') {
            const email = (data.email || '').trim().toLowerCase();
            const sifre = data.sifre || '';
            const allowedEmail = /@(gmail\.com|hotmail\.com)$/i.test(email);
            const validPassword = /^(?=.*[A-Za-z])(?=.*\d).{6,}$/.test(sifre);

            if (!allowedEmail) {
                alert('Kayıt için e-posta adresiniz @gmail.com veya @hotmail.com ile bitmelidir.');
                return;
            }

            if (!validPassword) {
                alert('Şifre en az 6 karakter olmalı ve en az 1 harf ile 1 sayı içermelidir.');
                return;
            }
        }

        btn.disabled = true;
        btn.innerText = 'Bekleyiniz...';

        try {
            const response = await fetch('/api/auth?action=' + type, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const res = await response.json();

            if(res.success) {
                localStorage.setItem('token', res.token);
                localStorage.setItem('gp_token', res.token);
                localStorage.setItem('user', JSON.stringify(res.user));
                alert(type === 'login' ? 'Hoş geldiniz!' : 'Kaydınız başarıyla oluşturuldu!');
                window.location.href = '/';
            } else {
                alert('Hata: ' + (res.error || 'Bilgiler yanlış.'));
            }
        } catch (err) {
            alert('Bağlantı Hatası! Vercel Logs kısmını kontrol edin.');
        } finally {
            btn.disabled = false;
            btn.innerText = type === 'login' ? 'GİRİŞ YAP' : 'HESAP OLUŞTUR';
        }
    }
</script>
</body>
</html>
